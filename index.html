<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XQ 達人成效彙整表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f5f6fa; color: #333; }

  header { background: #1a1a2e; color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; color: #aaa; margin-left: auto; }

  .toolbar { padding: 16px 32px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #fff; border-bottom: 1px solid #e0e0e0; }
  .toolbar input { padding: 7px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 220px; }
  .filter-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .count { margin-left: auto; font-size: 13px; color: #888; }

  .table-wrap { overflow-x: auto; padding: 24px 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  th { background: #1a1a2e; color: #fff; padding: 11px 14px; text-align: left; font-weight: 500; white-space: nowrap; position: sticky; top: 0; cursor: pointer; user-select: none; }
  th:hover { background: #2d2d4e; }
  th .sort-icon { margin-left: 4px; opacity: .4; font-size: 10px; }
  th.sorted .sort-icon { opacity: 1; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge-active   { background: #e6f4ea; color: #2e7d32; }
  .badge-employee { background: #e8f0fe; color: #1565c0; }
  .badge-broker   { background: #fff3e0; color: #e65100; }
  .badge-ended    { background: #fce4ec; color: #b71c1c; }

  .trend-up   { color: #2e7d32; font-weight: 600; }
  .trend-flat { color: #888; }
  .trend-down { color: #c62828; font-weight: 600; }

  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .zero { color: #bbb; }
  .dash { color: #ccc; }

  .tag-講師 { background: #ede7f6; color: #4527a0; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .tag-達人  { background: #e0f2f1; color: #00695c; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }
  .tag-券商  { background: #fff8e1; color: #f57f17; display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; }

  .col-name { min-width: 80px; }
  .col-real  { min-width: 90px; color: #777; font-size: 12px; }
  .no-data   { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>XQ 達人成效彙整表</h1>
  <span id="updated">共 <b id="total-count">0</b> 筆</span>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="搜尋稱呼 / 姓名 / 優惠碼…" oninput="render()">
  <button class="filter-btn active" data-filter="all"    onclick="setFilter(this)">全部</button>
  <button class="filter-btn"        data-filter="合作中"  onclick="setFilter(this)">合作中</button>
  <button class="filter-btn"        data-filter="公司員工" onclick="setFilter(this)">公司員工</button>
  <button class="filter-btn"        data-filter="合作券商" onclick="setFilter(this)">合作券商</button>
  <button class="filter-btn"        data-filter="合作終止" onclick="setFilter(this)">合作終止</button>
  <span class="count" id="row-count"></span>
</div>

<div class="table-wrap">
<table id="main-table">
  <thead>
    <tr>
      <th onclick="sortBy('稱呼')">稱呼 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('真實姓名')">真實姓名 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('狀態')">狀態 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('分類')">分類 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('優惠碼')">優惠碼 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('合作開始日')">合作開始日 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('贊助到期日')">贊助到期日 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('最新有效訂單數')" title="最新有效訂單數">訂單(最新) <span class="sort-icon">⇅</span></th>
      <th class="num" onclick="sortBy('訂單_2026/02')" title="2026年2月">訂單_上月 <span class="sort-icon">⇅</span></th>
      <th class="num" onclick="sortBy('訂單_2026/03')" title="2026年3月">訂單_當月 <span class="sort-icon">⇅</span></th>
      <th onclick="sortBy('訂單趨勢(月比月)')">訂單趨勢 <span class="sort-icon">⇅</span></th>
      <th class="num" onclick="sortBy('優惠碼累計綁定人數')" title="優惠碼累計綁定人數">優惠碼(累計) <span class="sort-icon">⇅</span></th>
      <th class="num" onclick="sortBy('優惠碼新增_上個月')" title="2026年2月">優惠碼_上月 <span class="sort-icon">⇅</span></th>
      <th class="num" onclick="sortBy('優惠碼新增_當月')" title="2026年3月">優惠碼_當月 <span class="sort-icon">⇅</span></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

let currentFilter = 'all';
let sortKey = '';
let sortAsc = true;

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  event.currentTarget.classList.add('sorted');
  event.currentTarget.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
  render();
}

function numVal(v) {
  const n = parseInt(v);
  return isNaN(n) ? -1 : n;
}

function filtered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = RAW.slice();
  if (currentFilter !== 'all') rows = rows.filter(r => r['狀態'] === currentFilter);
  if (q) rows = rows.filter(r =>
    (r['稱呼']||'').toLowerCase().includes(q) ||
    (r['真實姓名']||'').toLowerCase().includes(q) ||
    (r['優惠碼']||'').toLowerCase().includes(q)
  );
  if (sortKey) {
    rows.sort((a, b) => {
      let va = a[sortKey] || '', vb = b[sortKey] || '';
      const na = numVal(va), nb = numVal(vb);
      if (na >= 0 && nb >= 0) return sortAsc ? na - nb : nb - na;
      return sortAsc ? va.localeCompare(vb, 'zh-TW') : vb.localeCompare(va, 'zh-TW');
    });
  }
  return rows;
}

function badgeStatus(s) {
  const map = { '合作中':'badge-active','公司員工':'badge-employee','合作券商':'badge-broker','合作終止':'badge-ended' };
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}
function tagType(t) {
  if (t.includes('講師')) return `<span class="tag-講師">${t}</span>`;
  if (t === '達人')       return `<span class="tag-達人">${t}</span>`;
  if (t === '券商')       return `<span class="tag-券商">${t}</span>`;
  return t;
}
function trendClass(v) {
  if (v.includes('↑')) return 'trend-up';
  if (v.includes('↓')) return 'trend-down';
  return 'trend-flat';
}
function numCell(v) {
  if (!v || v === '-') return '<td class="num dash">—</td>';
  const n = parseInt(v);
  if (isNaN(n)) return `<td class="num">${v}</td>`;
  if (n === 0)  return '<td class="num zero">0</td>';
  return `<td class="num">${n.toLocaleString()}</td>`;
}

function render() {
  const rows = filtered();
  document.getElementById('row-count').textContent = `顯示 ${rows.length} 筆`;
  document.getElementById('total-count').textContent = rows.length;
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="15" class="no-data">沒有符合的資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="col-name"><b>${r['稱呼']||''}</b></td>
      <td class="col-real">${r['真實姓名']||''}</td>
      <td>${badgeStatus(r['狀態']||'')}</td>
      <td>${tagType(r['分類']||'')}</td>
      <td style="color:#555;font-size:12px">${r['優惠碼']||'—'}</td>
      <td>${r['合作開始日']||''}</td>
      <td style="font-size:12px">${r['贊助到期日']||'—'}</td>
      ${numCell(r['最新有效訂單數'])}
      ${numCell(r['訂單_2026/02'])}
      ${numCell(r['訂單_2026/03'])}
      <td class="${trendClass(r['訂單趨勢(月比月)']||'')}">${r['訂單趨勢(月比月)']||'—'}</td>
      ${numCell(r['優惠碼累計綁定人數'])}
      ${numCell(r['優惠碼新增_上個月'])}
      ${numCell(r['優惠碼新增_當月'])}
    </tr>`).join('');
}
